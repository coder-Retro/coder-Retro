name: Generate 3D Snake

on:
  schedule:
    # Runs every 12 hours automatically
    - cron: "0 */12 * * *"
  
  # Allows manual triggering via the Actions tab
  workflow_dispatch:
  
  # Runs every time you push to the main branch
  push:
    branches:
    - main

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # Generates the 3D Isometric Snake game from your contribution graph
      - name: Generate 3D Isometric Snake
        uses: Platane/snk@v3
        with:
          github_user_name: coder-Retro
          outputs: |
            dist/github-snake-3d.svg?shape=isometric
            dist/github-snake-3d-dark.svg?shape=isometric&palette=github-dark
          
      # Pushes the generated SVGs to a dedicated branch named "output"
      - name: Push results to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
