name: Generate 3D Snake Animation

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
    - main

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: Generate 3D Isometric Snake
        uses: Platane/snk@v3
        with:
          github_user_name: coder-Retro
          outputs: |
            dist/github-snake-3d.svg?shape=isometric&palette=github
            dist/github-snake-3d-dark.svg?shape=isometric&palette=github-dark
          
      # Pushes the 3D snake SVGs to a branch named "output"
      - name: Push results to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
